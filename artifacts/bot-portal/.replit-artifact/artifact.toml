kind = "web"
previewPath = "/"
title = "Mireo // Silt"
version = "1.0.0"
id = "artifacts/bot-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20058
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bot-portal run dev"

[services.env]
PORT = "20058"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bot-portal", "run", "build"]
publicDir = "artifacts/bot-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
